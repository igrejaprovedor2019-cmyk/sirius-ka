<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"

import {
  getDatabase,
  ref,
  set,
  push,
  onValue,
  update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"

const firebaseConfig = {

  apiKey: "AIzaSyAjOaYYOwhGhbe_fHf2pwSGVzeHyB2m4zE",

  authDomain: "quiz-dbv.firebaseapp.com",

  databaseURL: "https://quiz-dbv-default-rtdb.firebaseio.com",

  projectId: "quiz-dbv",

  storageBucket: "quiz-dbv.firebasestorage.app",

  messagingSenderId: "870891743518",

  appId: "1:870891743518:web:d4dacc306d3b039c34010f",

  measurementId: "G-36XPTYT4LD"

}

// INICIAR FIREBASE

const app = initializeApp(firebaseConfig)

const db = getDatabase(app)

console.log("Firebase conectado 🔥")

// ========================================
// CRIAR PLAYERS TESTE
// ========================================

function addPlayer(name){

  const id = Date.now() + Math.floor(Math.random() * 1000)

  set(ref(db, 'players/' + id), {

    name: name,
    points: 0,
    answered: false

  })

}

// TESTE

addPlayer("João")
addPlayer("Maria")
addPlayer("Pedro")

// ========================================
// MOSTRAR PLAYERS EM TEMPO REAL
// ========================================

onValue(ref(db, 'players'), (snapshot) => {

  const data = snapshot.val()

  const playersDiv = document.getElementById("players")

  playersDiv.innerHTML = ""

  for(let id in data){

    playersDiv.innerHTML += `

      <div class="bg-black/40 p-3 rounded-xl flex justify-between">

        <span>
          ✅ ${data[id].name}
        </span>

        <span class="text-yellow-400">
          ${data[id].points} pts
        </span>

      </div>

    `

  }

})

// ========================================
// RANKING AO VIVO
// ========================================

onValue(ref(db, 'players'), (snapshot) => {

  const data = snapshot.val()

  const rankingDiv = document.getElementById("ranking")

  rankingDiv.innerHTML = ""

  const players = Object.entries(data || {})
    .map(([id, player]) => ({
      id,
      ...player
    }))
    .sort((a,b) => b.points - a.points)

  players.forEach((player, index) => {

    let medal = "🏅"

    if(index === 0) medal = "🥇"
    if(index === 1) medal = "🥈"
    if(index === 2) medal = "🥉"

    rankingDiv.innerHTML += `

      <div class="bg-black/40 p-4 rounded-2xl flex justify-between text-xl">

        <span>
          ${medal} ${player.name}
        </span>

        <span class="text-yellow-400">
          ${player.points}
        </span>

      </div>

    `

  })

})

// ========================================
// SISTEMA DE PERGUNTAS
// ========================================

const questions = [

  {

    question: "Quem enfrentou Golias?",

    answers: [
      "Moisés",
      "Davi",
      "Pedro",
      "Paulo"
    ],

    correct: 1,

    double: false

  },

  {

    question: "Quem entrou na arca?",

    answers: [
      "Noé",
      "Daniel",
      "Abraão",
      "Samuel"
    ],

    correct: 0,

    double: true

  }

]

let currentQuestion = 0

// ========================================
// INICIAR JOGO
// ========================================

window.startGame = function(){

  showQuestion()

}

// ========================================
// PRÓXIMA PERGUNTA
// ========================================

window.nextQuestion = function(){

  currentQuestion++

  if(currentQuestion >= questions.length){

    currentQuestion = 0

  }

  showQuestion()

}

// ========================================
// MOSTRAR PERGUNTA
// ========================================

function showQuestion(){

  const q = questions[currentQuestion]

  const question = document.getElementById("question")

  const answers = document.getElementById("answers")

  question.innerText = q.question

  answers.innerHTML = ""

  answers.classList.add("hidden")

  q.answers.forEach((answer, index) => {

    answers.innerHTML += `

      <div class="bg-blue-500 p-5 rounded-2xl text-2xl font-bold">

        ${String.fromCharCode(65 + index)}) ${answer}

      </div>

    `

  })

  const box = document.getElementById("questionBox")

  box.classList.remove("questionAnimation")

  void box.offsetWidth

  box.classList.add("questionAnimation")

  setTimeout(() => {

    answers.classList.remove("hidden")

  }, 2500)

  startTimer()

}

// ========================================
// TIMER
// ========================================

function startTimer(){

  const timer = document.getElementById("timer")

  let width = 100

  timer.style.width = width + "%"

  const interval = setInterval(() => {

    width--

    timer.style.width = width + "%"

    if(width <= 0){

      clearInterval(interval)

    }

  },150)

}

</script>
