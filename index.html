<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Quiz Bíblico DBV</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>

    body{
      margin:0;
      overflow:hidden;
      font-family:Arial;
      background:black;
      color:white;
    }

    .bg{
      position:fixed;
      inset:0;
      background:url('https://images.unsplash.com/photo-1504052434569-70ad5836ab65?q=80&w=1974&auto=format&fit=crop') center/cover;
      filter:blur(10px);
      transform:scale(1.1);
      opacity:0.25;
    }

    .glass{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.1);
    }

    .questionAnimation{
      animation:zoom .8s ease;
    }

    @keyframes zoom{
      0%{
        transform:scale(.6);
        opacity:0;
      }

      100%{
        transform:scale(1);
        opacity:1;
      }
    }

  </style>
</head>

<body>

<div class="bg"></div>

<div class="relative z-10 flex h-screen">

  <!-- esquerda -->

  <div class="w-[320px] p-4 flex flex-col gap-4">

    <div class="glass rounded-3xl p-5">

      <h1 class="text-3xl font-bold text-yellow-400">
        QUIZ DBV
      </h1>

      <p class="text-gray-300 mt-2">
        Sala: DBV-4821
      </p>

    </div>

    <div class="glass rounded-3xl p-5 flex flex-col items-center">

      <h2 class="text-2xl font-bold mb-4">
        QR CODE
      </h2>

      <div id="qrcode"></div>

    </div>

    <div class="glass rounded-3xl p-5 flex-1 overflow-auto">

      <h2 class="text-2xl font-bold text-yellow-400 mb-4">
        Jogadores
      </h2>

      <div class="space-y-3">

        <div class="bg-black/40 p-3 rounded-xl">
          ✅ João
        </div>

        <div class="bg-black/40 p-3 rounded-xl">
          ✅ Maria
        </div>

        <div class="bg-black/40 p-3 rounded-xl">
          ✅ Pedro
        </div>

      </div>

    </div>

  </div>

  <!-- centro -->

  <div class="flex-1 p-4 flex flex-col gap-4">

    <div class="glass rounded-3xl p-5 flex justify-between items-center">

      <div>

        <h2 class="text-3xl font-bold text-yellow-400">
          Painel ADM
        </h2>

        <p class="text-gray-300">
          Controle da partida
        </p>

      </div>

      <div class="flex gap-3">

        <button onclick="startGame()"
        class="bg-green-500 px-6 py-3 rounded-2xl font-bold">
          INICIAR
        </button>

        <button onclick="nextQuestion()"
        class="bg-yellow-400 text-black px-6 py-3 rounded-2xl font-bold">
          PRÓXIMA
        </button>

        <button
        class="bg-red-500 px-6 py-3 rounded-2xl font-bold">
          FINALIZAR
        </button>

      </div>

    </div>

    <div class="glass rounded-3xl flex-1 flex flex-col justify-center items-center p-10 text-center">

      <div id="questionBox" class="questionAnimation">

        <h1 id="question"
        class="text-6xl font-bold text-yellow-300 mb-12">

          Quem enfrentou Golias?

        </h1>

        <div id="answers"
        class="hidden grid grid-cols-2 gap-5 w-full max-w-5xl">

          <div class="bg-blue-500 p-5 rounded-2xl text-2xl font-bold">
            A) Moisés
          </div>

          <div class="bg-green-500 p-5 rounded-2xl text-2xl font-bold">
            B) Davi
          </div>

          <div class="bg-red-500 p-5 rounded-2xl text-2xl font-bold">
            C) Pedro
          </div>

          <div class="bg-yellow-400 text-black p-5 rounded-2xl text-2xl font-bold">
            D) Paulo
          </div>

        </div>

      </div>

      <div class="w-full max-w-4xl mt-12">

        <div class="bg-white/10 rounded-full h-5 overflow-hidden">

          <div id="timer"
          class="bg-yellow-400 h-5 rounded-full"
          style="width:100%">
          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- ranking -->

  <div class="w-[320px] p-4">

    <div class="glass rounded-3xl h-full p-5 overflow-auto">

      <h2 class="text-3xl font-bold text-yellow-400 mb-5">
        Ranking
      </h2>

      <div class="space-y-3">

        <div class="bg-black/40 p-4 rounded-2xl flex justify-between">
          <span>🥇 João</span>
          <span>5400</span>
        </div>

        <div class="bg-black/40 p-4 rounded-2xl flex justify-between">
          <span>🥈 Maria</span>
          <span>5000</span>
        </div>

        <div class="bg-black/40 p-4 rounded-2xl flex justify-between">
          <span>🥉 Pedro</span>
          <span>3200</span>
        </div>

      </div>

    </div>

  </div>

</div>

<script>

new QRCode(document.getElementById("qrcode"),{
  text:"https://seusite.com",
  width:220,
  height:220,
  colorDark:"#ffffff",
  colorLight:"transparent"
})

function startGame(){
  showQuestion()
}

function nextQuestion(){
  showQuestion()
}

function showQuestion(){

  const answers = document.getElementById("answers")

  answers.classList.add("hidden")

  const box = document.getElementById("questionBox")

  box.classList.remove("questionAnimation")

  void box.offsetWidth

  box.classList.add("questionAnimation")

  setTimeout(()=>{
    answers.classList.remove("hidden")
  },2500)

  startTimer()

}

function startTimer(){

  const timer = document.getElementById("timer")

  let width = 100

  timer.style.width = width + "%"

  const interval = setInterval(()=>{

    width--

    timer.style.width = width + "%"

    if(width <= 0){
      clearInterval(interval)
    }

  },150)

}

</script>

</body>
</html>
